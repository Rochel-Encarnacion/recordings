<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VideoVault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--surface:#111111;--surface2:#171717;--surface3:#1f1f1f;
  --border:#252525;--border2:#2e2e2e;--border3:#3a3a3a;
  --text:#efefef;--text2:#9a9a9a;--text3:#555;
  --accent:#e8ff6b;--accent2:#c8df4a;--accent-dim:rgba(232,255,107,.1);
  --danger:#ff5757;--success:#4ade80;--info:#60a5fa;
  --radius:8px;--radius2:12px;--radius3:16px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Sidebar ── */
.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.logo{font-size:16px;font-weight:800;letter-spacing:-.5px;color:var(--accent);user-select:none}
.logo-sub{color:var(--text3);font-weight:400;font-size:13px}
.sidebar-body{flex:1;overflow-y:auto;padding:8px 0 16px}
.sidebar-body::-webkit-scrollbar{width:3px}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.nav-group{margin-bottom:4px}
.nav-group-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);padding:10px 18px 4px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px 7px 16px;cursor:pointer;border-radius:0;transition:all .12s;position:relative;user-select:none;margin:0 6px;border-radius:7px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface3);color:var(--text)}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;color:var(--text2)}
.nav-item.active .nav-name{color:var(--text)}
.nav-item:hover .nav-name{color:var(--text)}
.nav-count{font-size:10px;color:var(--text3);background:var(--surface3);padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;font-weight:600}
.nav-actions{display:none;gap:2px;flex-shrink:0}
.nav-item:hover .nav-actions{display:flex}
.nav-actions button{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 5px;border-radius:4px;font-size:12px;line-height:1;transition:.1s}
.nav-actions button:hover{color:var(--text);background:var(--border2)}
.add-item-btn{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;color:var(--text3);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.12s;margin:2px 0}
.add-item-btn:hover{color:var(--accent)}

/* ── Topbar ── */
.topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 20px;background:var(--surface);flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-.3px}
.search-wrap{position:relative}
.search-input{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;padding:7px 12px 7px 32px;width:190px;outline:none;transition:all .15s}
.search-input:focus{border-color:var(--border3);width:240px;background:var(--surface3)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.topbar-select{background:var(--surface2);border:1px solid var(--border2);border-radius:7px;color:var(--text2);font-size:12px;padding:7px 10px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
.view-toggle{display:flex;gap:1px;background:var(--surface2);border:1px solid var(--border2);border-radius:7px;padding:3px;overflow:hidden}
.view-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:4px 9px;border-radius:5px;font-size:14px;transition:.12s;line-height:1}
.view-btn.active{background:var(--surface3);color:var(--text)}
.upload-btn{background:var(--accent);color:#0a0a0a;border:none;border-radius:7px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.12s;letter-spacing:.2px}
.upload-btn:hover{background:var(--accent2);transform:translateY(-1px)}
.upload-btn:active{transform:none}
input[type=file]{display:none}

/* ── Content ── */
.content-wrap{flex:1;overflow-y:auto;overflow-x:hidden}
.content-wrap::-webkit-scrollbar{width:5px}
.content-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.content{padding:20px}

/* ── Drop zone ── */
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius2);padding:40px 20px;text-align:center;transition:all .2s;cursor:pointer;margin-bottom:20px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-dim)}
.drop-zone.compact{padding:14px 20px;display:flex;align-items:center;gap:12px;text-align:left}
.dz-icon{font-size:36px;margin-bottom:10px;opacity:.35}
.dz-icon.compact{font-size:20px;margin:0;opacity:.3}
.dz-text{font-size:13px;color:var(--text2)}
.dz-sub{font-size:11px;color:var(--text3);margin-top:5px}

/* ── Upload progress ── */
.uploads-wrap{margin-bottom:16px;display:flex;flex-direction:column;gap:6px}
.upload-item{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 14px}
.upload-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.upload-icon{font-size:16px;opacity:.6}
.upload-name{flex:1;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upload-pct{font-size:11px;color:var(--text3);font-weight:600}
.prog-track{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .25s ease}

/* ── Breadcrumb ── */
.breadcrumb{display:flex;align-items:center;gap:5px;margin-bottom:16px;font-size:12px;color:var(--text3)}
.bc-link{cursor:pointer;padding:2px 5px;border-radius:4px;transition:.1s}
.bc-link:hover{color:var(--text);background:var(--surface2)}
.bc-sep{opacity:.4}
.bc-cur{color:var(--text2)}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:16px;margin-bottom:18px;font-size:12px;color:var(--text3)}
.stat{display:flex;align-items:center;gap:5px}
.stat-val{color:var(--text2);font-weight:600}

/* ── Grid ── */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px}

/* ── Card ── */
.video-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.video-card:hover{border-color:var(--border3);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.video-card.selected{border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent)}
.video-card.dragging{opacity:.4;transform:scale(.97)}
.video-thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.thumb-bg{position:absolute;inset:0;opacity:.2}
.thumb-play{font-size:22px;z-index:1;opacity:.6}
.thumb-duration{position:absolute;bottom:5px;right:7px;background:rgba(0,0,0,.85);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;z-index:1;letter-spacing:.3px}
.card-check{position:absolute;top:7px;left:7px;width:19px;height:19px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3);background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:10px;z-index:2;transition:.12s}
.video-card:hover .card-check,.video-card.selected .card-check{border-color:var(--accent)}
.video-card.selected .card-check{background:var(--accent);color:#000;border-color:var(--accent)}
.card-fav{position:absolute;top:7px;right:32px;font-size:12px;z-index:2;opacity:0;transition:.12s;background:rgba(0,0,0,.6);border-radius:4px;padding:2px 5px;cursor:pointer;border:none;color:#f0c040}
.card-menu-btn{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.7);border:none;color:var(--text);cursor:pointer;padding:3px 7px;border-radius:5px;font-size:13px;z-index:2;opacity:0;transition:.12s;line-height:1}
.video-card:hover .card-fav,.video-card:hover .card-menu-btn{opacity:1}
.video-card-body{padding:10px 11px 11px}
.card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.card-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3)}
.fav-dot{color:#f0c040;font-size:10px}

/* ── List view ── */
.video-list{display:flex;flex-direction:column;gap:4px}
.list-header{display:flex;align-items:center;gap:12px;padding:5px 12px;font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--text3);text-transform:uppercase}
.list-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;transition:all .12s;user-select:none}
.list-item:hover{border-color:var(--border2);background:var(--surface2)}
.list-item.selected{border-color:var(--accent)}
.list-thumb{width:52px;height:30px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden;position:relative}
.list-thumb-bg{position:absolute;inset:0;opacity:.25}
.list-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.list-col{font-size:12px;color:var(--text3);white-space:nowrap}
.list-dur{width:60px;text-align:right}
.list-size{width:70px;text-align:right}
.list-date{width:100px;text-align:right}
.list-acts{display:flex;gap:3px;opacity:0;transition:.12s;flex-shrink:0}
.list-item:hover .list-acts{opacity:1}
.list-act-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px 6px;border-radius:5px;font-size:12px;transition:.1s}
.list-act-btn:hover{color:var(--text);background:var(--border2)}
.list-act-btn.danger:hover{color:var(--danger)}

/* ── Folder grid ── */
.folder-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.folder-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 14px 12px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px}
.folder-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px)}
.folder-card.drag-target{border-color:var(--accent);background:var(--accent-dim)}
.folder-top{display:flex;align-items:center;gap:8px}
.folder-ico{font-size:22px;line-height:1}
.folder-info{flex:1;min-width:0}
.folder-nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder-ct{font-size:11px;color:var(--text3)}
.folder-actions{display:flex;gap:3px;opacity:0;transition:.12s}
.folder-card:hover .folder-actions{opacity:1}
.f-act-btn{background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:12px;transition:.1s}
.f-act-btn:hover{color:var(--text);background:var(--border2)}
.f-act-btn.danger:hover{color:var(--danger)}

/* ── Selection bar ── */
.sel-bar{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border3);border-radius:11px;padding:10px 16px;display:flex;align-items:center;gap:10px;font-size:13px;box-shadow:0 10px 40px rgba(0,0,0,.6);z-index:100;transition:all .2s;white-space:nowrap}
.sel-bar.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(8px)}
.sel-count{font-weight:700;color:var(--accent);padding-right:8px;border-right:1px solid var(--border2)}
.sel-sep{width:1px;height:16px;background:var(--border2)}
.sel-action{background:none;border:none;color:var(--text2);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;transition:.12s;font-weight:500}
.sel-action:hover{color:var(--text);background:var(--surface3)}
.sel-action.danger:hover{color:var(--danger)}
.sel-close{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;margin-left:4px}
.sel-close:hover{color:var(--text)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius3);padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-title{font-size:15px;font-weight:700;margin-bottom:16px;letter-spacing:-.2px}
.modal-input{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:13px;padding:9px 13px;outline:none;transition:.12s;margin-bottom:12px}
.modal-input:focus{border-color:var(--border3)}
.modal-input::placeholder{color:var(--text3)}
.modal-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto;margin-bottom:12px}
.modal-list::-webkit-scrollbar{width:3px}
.modal-list::-webkit-scrollbar-thumb{background:var(--border2)}
.modal-list-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:.1s;font-size:13px;color:var(--text2)}
.modal-list-item:hover{background:var(--surface3);color:var(--text)}
.modal-list-item span{flex:1}
.modal-list-item .ml-count{font-size:11px;color:var(--text3)}
.modal-sep{height:1px;background:var(--border);margin:6px 0}
.modal-footer{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--text2);padding:7px 18px;border-radius:7px;cursor:pointer;font-size:13px;transition:.12s}
.btn-cancel:hover{border-color:var(--border3);color:var(--text)}
.btn-ok{background:var(--accent);border:none;color:#000;padding:8px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;transition:.12s}
.btn-ok:hover{background:var(--accent2)}

/* ── Context menu ── */
.ctx{position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:9px;padding:5px;z-index:300;min-width:170px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.ctx.hidden{display:none}
.ctx-item{display:flex;align-items:center;gap:9px;padding:8px 13px;font-size:13px;color:var(--text2);cursor:pointer;border-radius:6px;transition:.1s}
.ctx-item:hover{background:var(--surface3);color:var(--text)}
.ctx-item.danger:hover{color:var(--danger)}
.ctx-sep{height:1px;background:var(--border);margin:4px 5px}
.ctx-icon{width:16px;text-align:center;font-size:13px;opacity:.7}

/* ── Empty state ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3);text-align:center}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.2}
.empty-text{font-size:14px;margin-bottom:6px;color:var(--text2)}
.empty-sub{font-size:12px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Video<span class="logo-sub">Vault</span></div>
    </div>
    <div class="sidebar-body">
      <div class="nav-group">
        <div class="nav-group-label">Library</div>
        <div class="nav-item active" data-view="all" onclick="setView('all')">
          <span class="nav-icon">▶</span>
          <span class="nav-name">All Videos</span>
          <span class="nav-count" id="cnt-all">0</span>
        </div>
        <div class="nav-item" data-view="recent" onclick="setView('recent')">
          <span class="nav-icon">🕐</span>
          <span class="nav-name">Recent</span>
        </div>
        <div class="nav-item" data-view="favorites" onclick="setView('favorites')">
          <span class="nav-icon">★</span>
          <span class="nav-name">Favorites</span>
          <span class="nav-count" id="cnt-fav">0</span>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Folders</div>
        <div id="folder-nav"></div>
        <button class="add-item-btn" onclick="openModal('new-folder')">＋ New Folder</button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Playlists</div>
        <div id="playlist-nav"></div>
        <button class="add-item-btn" onclick="openModal('new-playlist')">＋ New Playlist</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">All Videos</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" id="search" placeholder="Search videos…" oninput="onSearch()">
      </div>
      <select class="topbar-select" id="sort-sel" onchange="onSort()">
        <option value="date-desc">Newest first</option>
        <option value="date-asc">Oldest first</option>
        <option value="name-asc">Name A–Z</option>
        <option value="name-desc">Name Z–A</option>
        <option value="size-desc">Largest first</option>
        <option value="size-asc">Smallest first</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="vbtn-grid" onclick="setDisplayMode('grid')" title="Grid view">⊞</button>
        <button class="view-btn" id="vbtn-list" onclick="setDisplayMode('list')" title="List view">☰</button>
      </div>
      <button class="upload-btn" onclick="document.getElementById('file-inp').click()">＋ Upload</button>
      <input type="file" id="file-inp" accept="video/*" multiple onchange="handleFiles(this.files)">
    </div>

    <div class="content-wrap" id="content-wrap"
      ondragover="onDragOver(event)"
      ondragleave="onDragLeave(event)"
      ondrop="onDropGlobal(event)">
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<!-- Selection Bar -->
<div class="sel-bar hidden" id="sel-bar">
  <span class="sel-count" id="sel-count">0 selected</span>
  <button class="sel-action" onclick="bulkMove()">📁 Move</button>
  <div class="sel-sep"></div>
  <button class="sel-action" onclick="bulkPlaylist()">▶ Playlist</button>
  <div class="sel-sep"></div>
  <button class="sel-action" onclick="bulkFavorite()">★ Favorite</button>
  <div class="sel-sep"></div>
  <button class="sel-action danger" onclick="bulkDelete()">🗑 Delete</button>
  <button class="sel-close" onclick="clearSel()">✕</button>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">New Folder</div>
    <input class="modal-input" id="modal-input" type="text" placeholder="Name…"
      onkeydown="if(event.key==='Enter')modalConfirm()">
    <div id="modal-list" class="modal-list" style="display:none"></div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" id="modal-ok" onclick="modalConfirm()">Create</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx hidden" id="ctx"></div>

<script>
// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const S = {
  videos:[],folders:[],playlists:[],
  view:'all', folder:null, playlist:null,
  displayMode:'grid', sort:'date-desc',
  search:'', selected:new Set(),
  uploads:[], nextId:1,
  modalMode:null, modalExtra:null,
  draggingIds:[],
};

const PALETTE=['#8b5cf6','#ec4899','#06b6d4','#f59e0b','#10b981','#ef4444','#3b82f6','#84cc16','#f97316','#a855f7'];
const col=id=>PALETTE[id%PALETTE.length];
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt_size=b=>b>=1e12?(b/1e12).toFixed(2)+' TB':b>=1e9?(b/1e9).toFixed(2)+' GB':b>=1e6?(b/1e6).toFixed(1)+' MB':b>=1e3?(b/1e3).toFixed(0)+' KB':b+' B';
const fmt_dur=s=>{if(!s||isNaN(s))return'--:--';const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=Math.floor(s%60);return h?h+':'+String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0'):String(m).padStart(2,'0')+':'+String(sc).padStart(2,'0');};
const fmt_date=ts=>new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});

// ══════════════════════════════════════════════════
// PERSISTENCE (localStorage)
// ══════════════════════════════════════════════════
const STORE_KEY='videovault_v1';
function save(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify({videos:S.videos,folders:S.folders,playlists:S.playlists,nextId:S.nextId}));}catch(e){}
}
function loadSaved(){
  try{
    const d=localStorage.getItem(STORE_KEY);
    if(d){const p=JSON.parse(d);S.videos=p.videos||[];S.folders=p.folders||[];S.playlists=p.playlists||[];S.nextId=p.nextId||1;}
  }catch(e){}
}

// ══════════════════════════════════════════════════
// FILE HANDLING
// ══════════════════════════════════════════════════
const MAX=256*1024*1024*1024;
function handleFiles(files){
  Array.from(files).forEach(f=>{
    if(f.size>MAX){alert(f.name+'\nexceeds the 256 GB limit.');return;}
    const id=S.nextId++;
    const vid={id,name:f.name,size:f.size,type:f.type,date:Date.now(),folder:S.view==='folder'?S.folder:null,playlist:S.view==='playlist'?S.playlist:null,favorite:false,duration:null,color:col(id)};
    S.videos.push(vid);
    simulateUpload(id,f.name,f.size);
    if(f.type.startsWith('video/')){
      const url=URL.createObjectURL(f);
      const el=document.createElement('video');
      el.preload='metadata';el.src=url;
      el.onloadedmetadata=()=>{const v=S.videos.find(x=>x.id===id);if(v){v.duration=el.duration;save();render();}URL.revokeObjectURL(url);};
    }
  });
  save();render();
  // reset input so same file can be re-selected
  document.getElementById('file-inp').value='';
}

function simulateUpload(id,name,size){
  const u={id,name,progress:0};
  S.uploads.push(u);
  const steps=30, iv=60;let step=0;
  const t=setInterval(()=>{
    step++;u.progress=Math.min(100,Math.round(step/steps*100+Math.random()*3));
    renderUploads();
    if(u.progress>=100){clearInterval(t);setTimeout(()=>{S.uploads=S.uploads.filter(x=>x.id!==id);renderUploads();},700);}
  },iv);
}

// ══════════════════════════════════════════════════
// DRAG & DROP (files onto window)
// ══════════════════════════════════════════════════
let isDraggingFile=false;
function onDragOver(e){
  if(e.dataTransfer.types.includes('Files')){e.preventDefault();isDraggingFile=true;document.querySelector('.drop-zone')?.classList.add('dragover');}
}
function onDragLeave(){isDraggingFile=false;document.querySelector('.drop-zone')?.classList.remove('dragover');}
function onDropGlobal(e){
  e.preventDefault();isDraggingFile=false;document.querySelector('.drop-zone')?.classList.remove('dragover');
  if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
}

// ══════════════════════════════════════════════════
// VIEWS
// ══════════════════════════════════════════════════
function setView(v,extra){
  S.view=v;S.folder=v==='folder'?extra:null;S.playlist=v==='playlist'?extra:null;
  clearSel();
  document.querySelectorAll('.nav-item').forEach(el=>{
    const active=(el.dataset.view===v&&!extra)||(v==='folder'&&+el.dataset.fid===extra)||(v==='playlist'&&+el.dataset.pid===extra);
    el.classList.toggle('active',active);
  });
  render();
}
function setDisplayMode(m){
  S.displayMode=m;
  document.getElementById('vbtn-grid').classList.toggle('active',m==='grid');
  document.getElementById('vbtn-list').classList.toggle('active',m==='list');
  render();
}
function onSort(){S.sort=document.getElementById('sort-sel').value;render();}
function onSearch(){S.search=document.getElementById('search').value.toLowerCase();render();}

function getVideos(){
  let vids=[...S.videos];
  if(S.search) vids=vids.filter(v=>v.name.toLowerCase().includes(S.search));
  if(S.view==='recent') vids=vids.sort((a,b)=>b.date-a.date).slice(0,30);
  else if(S.view==='favorites') vids=vids.filter(v=>v.favorite);
  else if(S.view==='folder') vids=vids.filter(v=>v.folder===S.folder);
  else if(S.view==='playlist') vids=vids.filter(v=>v.playlist===S.playlist);
  const[k,d]=S.sort.split('-');
  vids.sort((a,b)=>{
    const va=k==='name'?a.name:k==='size'?a.size:a.date;
    const vb=k==='name'?b.name:k==='size'?b.size:b.date;
    if(k==='name') return d==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return d==='asc'?va-vb:vb-va;
  });
  return vids;
}

// RENDER
// ══════════════════════════════════════════════════
function render(){
  updateCounts();
  renderFolderNav();
  renderPlaylistNav();
  renderContent();
}

function updateCounts(){
  document.getElementById('cnt-all').textContent=S.videos.length;
  document.getElementById('cnt-fav').textContent=S.videos.filter(v=>v.favorite).length;
}

function renderFolderNav(){
  document.getElementById('folder-nav').innerHTML=S.folders.map(f=>`
    <div class="nav-item" data-fid="${f.id}" onclick="setView('folder',${f.id})"
      ondragover="event.preventDefault();this.classList.add('drag-target-nav')"
      ondragleave="this.classList.remove('drag-target-nav')"
      ondrop="dropOnFolderNav(event,${f.id})">
      <span class="nav-icon">📁</span>

function renderPlaylistNav(){

      <span class="nav-name">${esc(p.name)}</span>
      <span class="nav-count">${S.videos.filter(v=>v.playlist===p.id).length}</span>
      <span class="nav-actions">

function renderContent(){
  const vids=getVideos();

  // title

  else if(S.view==='favorites') title='Favorites';
  else if(S.view==='folder'){const f=S.folders.find(x=>x.id===S.folder);title=f?f.name:'Folder';}
  else if(S.view==='playlist'){const p=S.playlists.find(x=>x.id===S.playlist);title=p?p.name:'Playlist';}
  document.getElementById('topbar-title').textContent=title;

  let html='';

  // breadcrumb
  if(S.view==='folder'||S.view==='playlist'){
    html+=`<div class="breadcrumb">
      <span class="bc-link" onclick="setView('all')">Library</span>
      <span class="bc-sep">/</span>
      <span class="bc-cur">${esc(title)}</span>
    </div>`;
  }

  // uploads
  html+='<div id="upload-area"></div>';

  // drop zone
  const compact=vids.length>0||S.uploads.length>0;
  if(compact){
    html+=`<div class="drop-zone compact" onclick="document.getElementById('file-inp').click()">
      <span class="dz-icon compact">＋</span>
      <span style="font-size:12px;color:var(--text3)">Drop videos here or click to upload · up to 256 GB per file</span>
    </div>`;
  } else {
    html+=`<div class="drop-zone" onclick="document.getElementById('file-inp').click()">
      <div class="dz-icon">🎬</div>
      <div class="dz-text">Drop videos here or click to upload</div>
      <div class="dz-sub">Any video format supported · Up to 256 GB per file</div>
    </div>`;
  }

  // stats
  if(vids.length){
    const totalSize=vids.reduce((a,v)=>a+v.size,0);
    html+=`<div class="stats-bar">
      <span class="stat"><span class="stat-val">${vids.length}</span> video${vids.length!==1?'s':''}</span>
      <span class="stat">·</span>
      <span class="stat"><span class="stat-val">${fmt_size(totalSize)}</span> total</span>
    </div>`;
  }

  // folder cards (only in all view)
  if(S.view==='all'&&!S.search&&S.folders.length){
    html+=`<div class="folder-grid">${S.folders.map(f=>`
      <div class="folder-card" data-fid="${f.id}"
        ondragover="event.preventDefault();this.classList.add('drag-target')"
        ondragleave="this.classList.remove('drag-target')"
        ondrop="dropOnFolder(event,${f.id})"
        onclick="setView('folder',${f.id})">
        <div class="folder-top">
          <span class="folder-ico">📁</span>
          <div class="folder-info">
            <div class="folder-nm">${esc(f.name)}</div>
            <div class="folder-ct">${S.videos.filter(v=>v.folder===f.id).length} videos</div>
          </div>
        </div>
        <div class="folder-actions">
          <button class="f-act-btn" onclick="event.stopPropagation();openModal('rename',{type:'folder',id:${f.id},name:'${esc(f.name)}'})">✎ Rename</button>
          <button class="f-act-btn danger" onclick="event.stopPropagation();deleteFolder(${f.id})">✕</button>
        </div>
      </div>`).join('')}</div>`;
  }

  // videos
  if(!vids.length&&S.videos.length){
    html+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No videos found</div><div class="empty-sub">Try a different search or filter</div></div>`;
  } else if(!vids.length){
    // no content at all, drop zone already showing
  } else if(S.displayMode==='grid'){
    html+=`<div class="video-grid">${vids.map(v=>renderCard(v)).join('')}</div>`;
  } else {
    html+=`<div class="video-list">
      <div class="list-header">
        <div style="width:52px;flex-shrink:0"></div>
        <div style="flex:1">Name</div>
        <div class="list-col list-dur">Duration</div>
        <div class="list-col list-size">Size</div>
        <div class="list-col list-date">Added</div>
        <div style="width:80px"></div>
      </div>
      ${vids.map(v=>renderListItem(v)).join('')}
    </div>`;
  }

  document.getElementById('content').innerHTML=html;
  renderUploads();
}

function renderUploads(){
  const el=document.getElementById('upload-area');
  if(!el) return;
  if(!S.uploads.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="uploads-wrap">${S.uploads.map(u=>`
    <div class="upload-item">
      <div class="upload-row">
        <span class="upload-icon">🎬</span>
        <span class="upload-name">${esc(u.name)}</span>
        <span class="upload-pct">${u.progress}%</span>
      </div>
      <div class="prog-track"><div class="prog-fill" style="width:${u.progress}%"></div></div>

}

// ══════════════════════════════════════════════════
// SELECTION
// ══════════════════════════════════════════════════
function cardClick(e,id){
  if(e.ctrlKey||e.metaKey||e.shiftKey||S.selected.size>0){
    S.selected.has(id)?S.selected.delete(id):S.selected.add(id);
  }
  updateSelBar();render();
}
function clearSel(){S.selected.clear();updateSelBar();render();}
function updateSelBar(){
  const n=S.selected.size;
  document.getElementById('sel-bar').classList.toggle('hidden',n===0);
  document.getElementById('sel-count').textContent=n+' selected';
}

// ══════════════════════════════════════════════════
// DRAG (cards to folders)
// ══════════════════════════════════════════════════
function cardDragStart(e,id){
  if(!S.selected.has(id)){S.selected.clear();S.selected.add(id);updateSelBar();}
  S.draggingIds=[...S.selected];
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','cards');
}
function dropOnFolder(e,fid){
  e.preventDefault();e.stopPropagation();
  e.currentTarget.classList.remove('drag-target');
  S.draggingIds.forEach(id=>{const v=S.videos.find(x=>x.id===id);if(v)v.folder=fid;});
  clearSel();save();render();
}
function dropOnFolderNav(e,fid){
  e.preventDefault();e.stopPropagation();
  e.currentTarget.classList.remove('drag-target-nav');
  if(e.dataTransfer.getData('text/plain')==='cards'){
    S.draggingIds.forEach(id=>{const v=S.videos.find(x=>x.id===id);if(v)v.folder=fid;});
    clearSel();save();render();
  }
}

// ══════════════════════════════════════════════════
// CONTEXT MENU
// ══════════════════════════════════════════════════
function showCtx(e,id){
  e.preventDefault();e.stopPropagation();
  const v=S.videos.find(x=>x.id===id);if(!v)return;
  if(!S.selected.has(id)){S.selected.clear();S.selected.add(id);updateSelBar();}
  const ctx=document.getElementById('ctx');
  ctx.innerHTML=`
    <div class="ctx-item" onclick="openModal('rename',{type:'video',id:${id},name:'${esc(v.name)}'}); closeCtx()"><span class="ctx-icon">✎</span> Rename</div>
    <div class="ctx-item" onclick="toggleFav(${id});closeCtx()"><span class="ctx-icon">${v.favorite?'☆':'★'}</span> ${v.favorite?'Remove favorite':'Add to favorites'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="bulkMove();closeCtx()"><span class="ctx-icon">📁</span> Move to folder</div>
    <div class="ctx-item" onclick="bulkPlaylist();closeCtx()"><span class="ctx-icon">▶</span> Add to playlist</div>
    ${v.folder!==null?`<div class="ctx-item" onclick="removeFromFolder(${id});closeCtx()"><span class="ctx-icon">✕</span> Remove from folder</div>`:''}
    ${v.playlist!==null?`<div class="ctx-item" onclick="removeFromPlaylist(${id});closeCtx()"><span class="ctx-icon">✕</span> Remove from playlist</div>`:''}
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" onclick="deleteVideo(${id});closeCtx()"><span class="ctx-icon">🗑</span> Delete</div>
  `;
  ctx.classList.remove('hidden');
  const x=Math.min(e.clientX,window.innerWidth-180);
  const y=Math.min(e.clientY,window.innerHeight-ctx.scrollHeight-10);
  ctx.style.left=x+'px';ctx.style.top=y+'px';
}
function closeCtx(){document.getElementById('ctx').classList.add('hidden');}
document.addEventListener('click',closeCtx);
document.addEventListener('contextmenu',e=>{if(!e.target.closest('.video-card')&&!e.target.closest('.list-item'))closeCtx();});

// ══════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════
function openModal(mode,extra){
  S.modalMode=mode;S.modalExtra=extra||null;
  const inp=document.getElementById('modal-input');
  const list=document.getElementById('modal-list');
  const ok=document.getElementById('modal-ok');
  const footer=document.getElementById('modal-footer');
  inp.style.display='';list.style.display='none';ok.style.display='';list.innerHTML='';
  document.getElementById('modal-overlay').classList.remove('hidden');

  switch(mode){
    case 'new-folder':
      document.getElementById('modal-title').textContent='New Folder';
      inp.value='';inp.placeholder='Folder name…';ok.textContent='Create';
      break;
    case 'new-playlist':
      document.getElementById('modal-title').textContent='New Playlist';
      inp.value='';inp.placeholder='Playlist name…';ok.textContent='Create';
      break;
    case 'rename':
      document.getElementById('modal-title').textContent='Rename';
      inp.value=extra.name;ok.textContent='Save';
      break;
    case 'move':
      document.getElementById('modal-title').textContent='Move to Folder';
      inp.style.display='none';ok.style.display='none';
      list.style.display='';
      list.innerHTML=(S.folders.length?S.folders.map(f=>`
        <div class="modal-list-item" onclick="doMove(${f.id})">
          <span>📁</span><span>${esc(f.name)}</span>
          <span class="ml-count">${S.videos.filter(v=>v.folder===f.id).length} videos</span>
        </div>`).join(''):'<div style="color:var(--text3);font-size:13px;padding:12px">No folders yet. Create one first.</div>')+
        `<div class="modal-sep"></div>
        <div class="modal-list-item" onclick="doMove(null)"><span>✕</span><span>Remove from folder</span></div>`;
      break;
    case 'playlist':
      document.getElementById('modal-title').textContent='Add to Playlist';
      inp.style.display='none';ok.style.display='none';
      list.style.display='';
      list.innerHTML=(S.playlists.length?S.playlists.map(p=>`
        <div class="modal-list-item" onclick="doPlaylist(${p.id})">
          <span>▶</span><span>${esc(p.name)}</span>
          <span class="ml-count">${S.videos.filter(v=>v.playlist===p.id).length}</span>
        </div>`).join(''):'<div style="color:var(--text3);font-size:13px;padding:12px">No playlists yet. Create one first.</div>')+
        `<div class="modal-sep"></div>
        <div class="modal-list-item" onclick="doPlaylist(null)"><span>✕</span><span>Remove from playlist</span></div>`;
      break;
  }
  setTimeout(()=>{if(inp.style.display!=='none')inp.focus();},60);
}

function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');}

function modalConfirm(){
  const val=document.getElementById('modal-input').value.trim();
  switch(S.modalMode){
    case 'new-folder': if(!val)return;S.folders.push({id:S.nextId++,name:val});break;
    case 'new-playlist': if(!val)return;S.playlists.push({id:S.nextId++,name:val});break;
    case 'rename':
      if(!val)return;
      if(S.modalExtra.type==='video'){const v=S.videos.find(x=>x.id===S.modalExtra.id);if(v)v.name=val;}
      else if(S.modalExtra.type==='folder'){const f=S.folders.find(x=>x.id===S.modalExtra.id);if(f)f.name=val;}
      else if(S.modalExtra.type==='playlist'){const p=S.playlists.find(x=>x.id===S.modalExtra.id);if(p)p.name=val;}
      break;
  }
  save();render();closeModal();
}

function doMove(fid){
  [...S.selected].forEach(id=>{const v=S.videos.find(x=>x.id===id);if(v)v.folder=fid;});
  clearSel();save();render();closeModal();
}
function doPlaylist(pid){
  [...S.selected].forEach(id=>{const v=S.videos.find(x=>x.id===id);if(v)v.playlist=pid;});
  clearSel();save();render();closeModal();
}

// Click outside modal
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});

// ══════════════════════════════════════════════════
// CRUD
// ══════════════════════════════════════════════════
function toggleFav(id){const v=S.videos.find(x=>x.id===id);if(v){v.favorite=!v.favorite;save();render();}}
function deleteVideo(id){S.videos=S.videos.filter(x=>x.id!==id);S.selected.delete(id);updateSelBar();save();render();}
function deleteFolder(id){if(!confirm('Delete this folder? Videos will be unassigned.'))return;S.folders=S.folders.filter(x=>x.id!==id);S.videos.forEach(v=>{if(v.folder===id)v.folder=null;});if(S.folder===id)setView('all');save();render();}
function deletePlaylist(id){if(!confirm('Delete this playlist? Videos will remain in your library.'))return;S.playlists=S.playlists.filter(x=>x.id!==id);S.videos.forEach(v=>{if(v.playlist===id)v.playlist=null;});if(S.playlist===id)setView('all');save();render();}
function removeFromFolder(id){const v=S.videos.find(x=>x.id===id);if(v){v.folder=null;save();render();}}
function removeFromPlaylist(id){const v=S.videos.find(x=>x.id===id);if(v){v.playlist=null;save();render();}}

// Bulk
function bulkMove(){if(!S.selected.size)return;openModal('move');}
function bulkPlaylist(){if(!S.selected.size)return;openModal('playlist');}
function bulkFavorite(){[...S.selected].forEach(id=>{const v=S.videos.find(x=>x.id===id);if(v)v.favorite=true;});save();render();}
function bulkDelete(){if(!confirm(`Delete ${S.selected.size} video(s)?`))return;[...S.selected].forEach(id=>{S.videos=S.videos.filter(x=>x.id!==id);});clearSel();save();render();}

// ══════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeCtx();closeModal();clearSel();}
  if((e.key==='a'||e.key==='A')&&(e.ctrlKey||e.metaKey)&&!e.target.matches('input')){
    e.preventDefault();getVideos().forEach(v=>S.selected.add(v.id));updateSelBar();render();
  }
  if(e.key==='Delete'&&S.selected.size&&!e.target.matches('input')) bulkDelete();
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
loadSaved();
render();
</script>
</body>
